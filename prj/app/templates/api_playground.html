{% extends 'base.html' %}

{% block title %}API Playground{% endblock %}

{% block content %}

<div class="container mt-4">
    <h1>API Playground</h1>

    <p>
        Tady testuju endpointy mojí FightLog API.
        JavaScript používá fetch(), který vrací Promise.
    </p>

    <h2>Test Training GET</h2>

    <input id="trainingId" type="number" value="1" class="form-control mb-2">

    <button onclick="loadTraining()" class="btn btn-primary">
        Načíst trénink
    </button>

    <button onclick="clearResult()" class="btn btn-secondary">
        Vyčistit
    </button>

    <pre id="result" class="bg-dark text-light p-3 mt-3 rounded"></pre>
</div>

<script>
function loadTraining() {
    let id = document.getElementById("trainingId").value;

    fetch("/api/training/" + id)
        .then(response => response.json())
        .then(data => {
            document.getElementById("result").textContent =
                JSON.stringify(data, null, 2);
        });
}

function clearResult() {
    document.getElementById("result").textContent = "";
}
</script>

{% endblock %}
