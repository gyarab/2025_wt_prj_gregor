{% extends "base.html" %}
{% block title %}Zadání tréninku | FightLog{% endblock %}

{% block content %}

<div class="page-card p-4 mb-4">
  <h1 class="mb-2">
    Zadání tréninku
  </h1>

  <p class="text-secondary">
    Formulář volá API endpoint <code>/api/training</code> pomocí JavaScriptu a fetch().
  </p>

  <div class="row g-3">
    <div class="col-md-4">
      <label class="form-label">ID uživatele</label>
      <input id="user_id" type="number" class="form-control" value="1">
    </div>

    <div class="col-md-4">
      <label class="form-label">Datum</label>
      <input id="date" type="date" class="form-control">
    </div>

    <div class="col-md-4">
      <label class="form-label">Začátek</label>
      <input id="start_time" type="time" class="form-control">
    </div>

    <div class="col-md-4">
      <label class="form-label">Délka v minutách</label>
      <input id="duration" type="number" class="form-control" value="90">
    </div>

    <div class="col-md-4">
      <label class="form-label">Výhry</label>
      <input id="wins" type="number" class="form-control" value="0">
    </div>

    <div class="col-md-4">
      <label class="form-label">Prohry</label>
      <input id="losses" type="number" class="form-control" value="0">
    </div>

    <div class="col-md-4">
      <label class="form-label">Remízy</label>
      <input id="draws" type="number" class="form-control" value="0">
    </div>

    <div class="col-12">
      <label class="form-label">Poznámky</label>
      <textarea id="notes" class="form-control" rows="4">Tvrdý grappling, práce na submisích.</textarea>
    </div>
  </div>

  <div class="d-flex flex-wrap gap-2 mt-4">
    <button class="btn btn-red" onclick="createTraining()">
      Uložit trénink
    </button>

    <button class="btn btn-outline-light" onclick="loadTrainings()">
      Načíst všechny tréninky
    </button>

    <button class="btn btn-outline-secondary" onclick="clearResult()">
      Vyčistit
    </button>
  </div>
</div>

<div id="message"></div>

<div id="trainings" class="d-flex flex-column gap-3"></div>

<script>
document.getElementById("date").valueAsDate = new Date();

function getNumber(id) {
  return Number(document.getElementById(id).value);
}

function getValue(id) {
  return document.getElementById(id).value;
}

function showMessage(text, type) {
  document.getElementById("message").innerHTML = `
    <div class="alert alert-${type} mt-3">
      ${text}
    </div>
  `;
}

function createTraining() {
  const payload = {
    user_id: getNumber("user_id"),
    date: getValue("date"),
    start_time: getValue("start_time") || null,
    duration: getNumber("duration"),
    notes: getValue("notes"),
    wins: getNumber("wins"),
    losses: getNumber("losses"),
    draws: getNumber("draws")
  };

  fetch("/api/training", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  })
    .then(response => response.json().then(data => ({
      ok: response.ok,
      status: response.status,
      data: data
    })))
    .then(result => {
      if (result.ok) {
        showMessage("Trénink byl úspěšně uložený.", "success");
        loadTrainings();
      } else {
        showMessage("Chyba při ukládání tréninku.", "danger");
        console.log(result.data);
      }
    })
    .catch(error => {
      showMessage("API se nepodařilo zavolat.", "danger");
      console.error(error);
    });
}

function loadTrainings() {
  fetch("/api/training")
    .then(response => response.json())
    .then(data => {
      const box = document.getElementById("trainings");
      box.innerHTML = "";

      data.forEach(training => {
        box.innerHTML += `
          <div class="fight-card p-4">
            <div class="d-flex justify-content-between flex-wrap gap-2">
              <h3 class="h5 mb-0">
                Trénink #${training.id}
              </h3>
              <span class="badge bg-danger">
                ${training.date}
              </span>
            </div>

            <p class="text-secondary mb-2">
              Uživatel: ${training.username} • Délka: ${training.duration} minut
            </p>

            <div class="d-flex flex-wrap gap-2 mb-3">
              <span class="badge bg-success">Výhry: ${training.wins}</span>
              <span class="badge bg-danger">Prohry: ${training.losses}</span>
              <span class="badge bg-secondary">Remízy: ${training.draws}</span>
            </div>

            <p class="mb-0">
              ${training.notes || "Bez poznámky"}
            </p>
          </div>
        `;
      });
    });
}

function clearResult() {
  document.getElementById("message").innerHTML = "";
  document.getElementById("trainings").innerHTML = "";
}
</script>

{% endblock %}
