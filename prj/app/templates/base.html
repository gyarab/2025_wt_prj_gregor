<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FightLog{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0b0f19;
      color: #f8fafc;
    }

    .navbar {
      background: #111827;
      border-bottom: 1px solid #dc2626;
    }

    .brand-red {
      color: #ef4444;
    }

    .page-card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }

    .hero {
      background:
        linear-gradient(135deg, rgba(220,38,38,.9), rgba(15,23,42,.95)),
        #111827;
      border-radius: 28px;
      padding: 48px 24px;
      border: 1px solid rgba(239,68,68,.5);
    }

    .fight-card {
      background: #151c2e;
      border: 1px solid #263244;
      border-radius: 22px;
      color: #f8fafc;
      transition: .2s;
    }

    .fight-card:hover {
      transform: translateY(-4px);
      border-color: #ef4444;
    }

    .btn-red {
      background: #dc2626;
      border: none;
      color: white;
    }

    .btn-red:hover {
      background: #b91c1c;
      color: white;
    }

    .form-control {
      background: #0f172a;
      border: 1px solid #334155;
      color: white;
    }

    .form-control:focus {
      background: #0f172a;
      color: white;
      border-color: #ef4444;
      box-shadow: 0 0 0 .2rem rgba(239,68,68,.25);
    }

    footer {
      color: #94a3b8;
      padding: 32px 0;
      text-align: center;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'home' %}">
      <span class="brand-red">Fight</span>Log
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Domů</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">O projektu</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'api_playground' %}">Zadání tréninku</a></li>
        <li class="nav-item"><a class="nav-link" href="/api/docs">API</a></li>
        <li class="nav-item"><a class="nav-link" href="/admin/">Admin</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<footer>
  FightLog • MMA & BJJ Training Tracker
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
