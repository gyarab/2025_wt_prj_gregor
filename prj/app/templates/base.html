<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FightLog{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #080c14;
      color: #f8fafc;
    }

    .navbar {
      background: #0f172a;
      border-bottom: 1px solid #dc2626;
    }

    .brand-red {
      color: #ef4444;
    }

    .page-card, .fight-card {
      background: #111827;
      border: 1px solid #243044;
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }

    .block-card {
      display: block;
      text-decoration: none;
      background: #111827;
      border: 1px solid #243044;
      border-radius: 30px;
      padding: 36px;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
      transition: .2s;
      color: white;
    }

    .block-card:hover {
      transform: translateY(-4px);
      border-color: #ef4444;
      color: white;
    }

    .btn-red {
      background: #dc2626;
      border: none;
      color: white;
    }

    .btn-red:hover {
      background: #b91c1c;
      color: white;
    }

    .btn-dark-red {
      background: #151c2e;
      border: 1px solid #ef4444;
      color: white;
    }

    .btn-dark-red:hover {
      background: #7f1d1d;
      color: white;
    }

    .form-control, .form-select {
      background: #0f172a;
      border: 1px solid #334155;
      color: white;
    }

    .form-control:focus, .form-select:focus {
      background: #0f172a;
      color: white;
      border-color: #ef4444;
      box-shadow: 0 0 0 .2rem rgba(239,68,68,.25);
    }

    .text-secondary {
      color: #94a3b8 !important;
    }

    .chart-wrap {
      height: 340px;
      max-width: 560px;
      margin: 0 auto;
    }

    .calendar-day {
      background: #0f172a;
      border: 1px solid #263244;
      border-radius: 14px;
      min-height: 62px;
      padding: 8px;
      text-align: center;
      font-size: 14px;
    }

    .trained-day {
      border-color: #ef4444;
      background: #450a0a;
    }

    .technique-pill {
      background: #151c2e;
      border: 1px solid #334155;
      border-radius: 18px;
      padding: 14px 18px;
      font-weight: 600;
    }

    footer {
      color: #94a3b8;
      padding: 32px 0;
      text-align: center;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'home' %}">
      <span class="brand-red">Fight</span>Log
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{% url 'home' %}">Domů</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'trainings' %}">Tréninky</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'techniques' %}">Techniky</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'statistics' %}">Statistiky</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'api_playground' %}">Zadat trénink</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-5">
  {% block content %}{% endblock %}
</main>

<footer>
  FightLog • MMA & BJJ Training Tracker
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
